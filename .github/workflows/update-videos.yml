name: Update video radar data

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-video-radar-data
  cancel-in-progress: false

jobs:
  update-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          MAX_PER_SOURCE: "8"
          SOURCE_CONCURRENCY: "8"
        run: node scripts/fetch-latest.mjs

      - name: Commit updated data
        run: |
          if git diff --quiet data/generated-videos.js; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/generated-videos.js
          git commit -m "Update video radar data"
          git push
