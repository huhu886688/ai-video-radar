      <stop offset="1" stop-color="#e8eceb"/>
    </linearGradient>
    <linearGradient id="darkA" x1="26" x2="146" y1="28" y2="148" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13171d"/>
      <stop offset="1" stop-color="#0b2522"/>
    </linearGradient>
    <linearGradient id="inkBlue" x1="210" x2="330" y1="28" y2="148" gradientUnits="userSpaceOnUse">
